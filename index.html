  <style>
    :root {
      --ink: #f4f5f7;
      --ink-dim: rgba(244, 245, 247, .68);
      --ink-faint: rgba(244, 245, 247, .42);
      --hair: rgba(255, 255, 255, .16);
      --panel: rgba(20, 22, 28, .34);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
      color: var(--ink);
      background: #11151c;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      /* 全局文字投影：亮色壁纸下也能撑住可读性 */
      text-shadow: 0 1px 2px rgba(0, 0, 0, .55), 0 0 12px rgba(0, 0, 0, .35);
    }

    /* 背景层 + 三层降级的兜底渐变 */
    #bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #11151c;
      background-image:
        radial-gradient(120% 90% at 18% 12%, #20303a 0%, #141a22 48%, #0c0f15 100%);
      opacity: 0;
      transform: scale(1.04);
      transition: opacity 1.1s ease, transform 6s ease;
      z-index: -2;
    }
    #bg.loaded { opacity: 1; transform: scale(1); }
    body.no-bg #bg { opacity: 1; transform: scale(1); }

    /* 压暗，保证文字可读；强度由 --mask 控制，JS 会按壁纸亮度自适应 */
    #bg::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: var(--mask, .85);
      transition: opacity .9s ease;
      /* 缓动渐变（多段近似 ease 曲线）：明暗过渡丝滑羽化，避免线性渐变的生硬边界 */
      background:
        linear-gradient(90deg,
          rgba(8, 10, 14, .60) 0%,
          rgba(8, 10, 14, .54) 9%,
          rgba(8, 10, 14, .46) 18%,
          rgba(8, 10, 14, .37) 28%,
          rgba(8, 10, 14, .28) 38%,
          rgba(8, 10, 14, .20) 48%,
          rgba(8, 10, 14, .13) 58%,
          rgba(8, 10, 14, .08) 68%,
          rgba(8, 10, 14, .04) 78%,
          rgba(8, 10, 14, .015) 89%,
          rgba(8, 10, 14, 0) 100%),
        linear-gradient(180deg,
          rgba(8, 10, 14, .20) 0%,
          rgba(8, 10, 14, .09) 12%,
          rgba(8, 10, 14, 0) 28%,
          rgba(8, 10, 14, 0) 60%,
          rgba(8, 10, 14, .06) 74%,
          rgba(8, 10, 14, .18) 87%,
          rgba(8, 10, 14, .34) 100%);
    }

    .stage {
      position: relative;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: clamp(20px, 4vh, 40px) clamp(20px, 5vw, 48px);
    }

    .stage-body {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      position: relative;
      flex: 0 1 640px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }

    /* 跟随文字的羽化暗色光晕：边缘虚化无硬边，任何壁纸下都托住文字 */
    main::before {
      content: "";
      position: absolute;
      inset: -10% -18% -10% -20%;
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(125% 100% at 26% 50%,
        rgba(6, 8, 12, .40) 0%,
        rgba(6, 8, 12, .32) 26%,
        rgba(6, 8, 12, .22) 44%,
        rgba(6, 8, 12, .13) 60%,
        rgba(6, 8, 12, .06) 74%,
        rgba(6, 8, 12, .02) 85%,
        rgba(6, 8, 12, 0) 94%);
      filter: blur(22px);
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid var(--hair);
      object-fit: cover;
      background: rgba(255, 255, 255, .06);
      margin-bottom: clamp(16px, 3vh, 26px);
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 3.6rem);
      font-weight: 600;
      letter-spacing: -.02em;
      line-height: 1.05;
      text-shadow: 0 2px 6px rgba(0, 0, 0, .55), 0 0 22px rgba(0, 0, 0, .4);
    }

    .tagline {
      margin-top: 12px;
      font-size: clamp(.92rem, 2.4vw, 1.02rem);
      font-weight: 400;
      color: var(--ink-dim);
      letter-spacing: .01em;
    }
    .tagline span { color: var(--ink-faint); padding: 0 .55em; }

    .bio {
      margin-top: clamp(16px, 3vh, 22px);
      max-width: 30em;
      font-size: clamp(.95rem, 2.5vw, 1.06rem);
      font-weight: 300;
      line-height: 1.7;
      color: var(--ink-dim);
    }

    /* 一言 */
    .saying {
      margin-top: clamp(18px, 3.4vh, 26px);
      padding-left: 14px;
      border-left: 2px solid var(--hair);
      cursor: pointer;
      max-width: 32em;
      user-select: none;
      transition: opacity .35s ease;
    }
    .saying p {
      font-size: clamp(.9rem, 2.3vw, 1rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.6;
      color: var(--ink-dim);
    }
    .saying .src { display: block; margin-top: 4px; font-style: normal; font-size: .8rem; color: var(--ink-faint); }
    .saying.swap { opacity: 0; }

    /* 链接 */
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: clamp(22px, 4vh, 32px);
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 15px;
      font-size: .9rem;
      font-weight: 400;
      color: var(--ink);
      text-decoration: none;
      border: 1px solid var(--hair);
      border-radius: 999px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: border-color .2s ease, background .2s ease, transform .2s ease;
    }
    .links a:hover {
      border-color: rgba(255, 255, 255, .42);
      background: rgba(255, 255, 255, .12);
      transform: translateY(-2px);
    }
    .links svg { width: 16px; height: 16px; display: block; }
    .posts-toggle { cursor: pointer; }

    /* ===== 最新博文面板 ===== */
    /* 关闭时宽度为 0；展开时挤出右侧空间，主内容随之平滑左移 */
    .posts-panel {
      flex: 0 0 0;
      overflow: hidden;
      align-self: center;
      opacity: 0;
      border-radius: 18px;
      transition: flex-basis .45s cubic-bezier(.4, 0, .2, 1),
                  margin-left .45s cubic-bezier(.4, 0, .2, 1),
                  opacity .3s ease;
    }
    body.posts-open .posts-panel {
      flex-basis: min(380px, 40vw);
      margin-left: clamp(24px, 4vw, 56px);
      opacity: 1;
    }
    .posts-inner {
      width: min(380px, 40vw);
      max-height: min(72vh, 560px);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      padding: 18px 18px 14px;
      border: 1px solid var(--hair);
      border-radius: 18px;
      background: rgba(18, 20, 26, .55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .posts-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .posts-title { font-size: .95rem; font-weight: 600; letter-spacing: .02em; }
    .posts-close {
      background: none;
      border: none;
      color: var(--ink-dim);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
      transition: color .2s ease;
    }
    .posts-close:hover { color: var(--ink); }
    .posts-body {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .post-card {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 11px 12px;
      border: 1px solid var(--hair);
      border-radius: 12px;
      text-decoration: none;
      color: var(--ink);
      background: rgba(255, 255, 255, .04);
      transition: border-color .2s ease, background .2s ease, transform .2s ease;
    }
    .post-card:hover {
      border-color: rgba(255, 255, 255, .4);
      background: rgba(255, 255, 255, .1);
      transform: translateY(-1px);
    }
    .post-card-title { font-size: .9rem; font-weight: 500; line-height: 1.35; }
    .post-card-date { font-size: .72rem; color: var(--ink-faint); }
    .post-card-desc {
      font-size: .78rem;
      line-height: 1.55;
      color: var(--ink-dim);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .posts-hint { font-size: .85rem; color: var(--ink-dim); line-height: 1.6; }
    .posts-hint a { color: var(--ink); text-decoration: underline; }
    .posts-more {
      margin-top: 12px;
      font-size: .8rem;
      color: var(--ink-dim);
      text-decoration: none;
      align-self: flex-end;
      transition: color .2s ease;
    }
    .posts-more:hover { color: var(--ink); }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      font-size: .72rem;
      line-height: 1.5;
      color: var(--ink-faint);
    }
    footer a { color: var(--ink-faint); text-decoration: none; }
    footer a:hover { color: var(--ink-dim); }
    .beian { display: flex; flex-direction: column; gap: 2px; }
    .beian .dot { padding: 0 .4em; color: var(--ink-faint); }

    /* 窄屏 / 移动端：博文面板交互体验不佳，直接隐藏按钮与面板 */
    @media (max-width: 820px) {
      .links a.posts-toggle { display: none; }
      body.posts-open .posts-panel {
        flex-basis: 0;
        margin-left: 0;
        opacity: 0;
      }
    }

    @media (max-width: 560px) {
      main { justify-content: center; }
      footer { font-size: .66rem; }
    }
  </style>
</head>

  <script>
    jQuery(function ($) {
      $("#year").text(new Date().getFullYear());

      /* ===================== 壁纸 =====================
       * 从本地图片里随机选一张作为背景（每次打开/刷新随机）。
       */
      var WALLPAPERS = [
        "assets/images/bg1.jpeg",
        "assets/images/bg2.jpeg",
        "assets/images/bg3.jpg",
        "assets/images/bg4.jpg",
        "assets/images/bg5.jpeg",
        "assets/images/bg6.jpg"
      ];
      var bg = $("#bg");

      /* 按壁纸（左侧文字区）的亮度自适应遮罩浓度：
       * 图越暗 → 遮罩越浅；图越亮 → 遮罩稍深以保证文字可读。
       * 壁纸是同源本地图，canvas 采样不会触发跨域污染。 */
      function adaptMask(image) {
        try {
          var w = 40, h = 24;
          var c = document.createElement("canvas");
          c.width = w; c.height = h;
          var ctx = c.getContext("2d");
          ctx.drawImage(image, 0, 0, w, h);
          var data = ctx.getImageData(0, 0, Math.round(w * 0.5), h).data; // 只看左半（文字所在）
          var sum = 0, n = 0;
          for (var i = 0; i < data.length; i += 4) {
            sum += 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
            n++;
          }
          var lum = sum / n / 255;                 // 0(暗)~1(亮)
          var mask = 0.30 + lum * 0.75;            // 映射到遮罩浓度
          mask = Math.max(0.28, Math.min(1, mask));
          document.documentElement.style.setProperty("--mask", mask.toFixed(2));
        } catch (e) { /* 不支持就用默认浓度 */ }
      }

      var pick = WALLPAPERS[Math.floor(Math.random() * WALLPAPERS.length)];
      var img = new Image();
      img.onload = function () {
        bg.css("background-image", 'url("' + pick + '")').addClass("loaded");
        $("body").removeClass("no-bg");
        adaptMask(img);
      };
      img.onerror = function () {
        if (!bg.hasClass("loaded")) { $("body").addClass("no-bg"); }
      };
      img.src = pick;

      /* ===================== 一言 ===================== */
      var FALLBACK = { hitokoto: "万般皆是命，半点不由人。", from: "" };
      var $box = $("#saying");
      var $text = $("#saying-text");
      var sayingLoading = false;

      function renderSaying(d) {
        var html = $("<div>").text(d.hitokoto).html();
        if (d.from) { html += '<span class="src">—— ' + $("<div>").text(d.from).html() + "</span>"; }
        $text.html(html);
      }

      function loadSaying() {
        if (sayingLoading) { return; }
        sayingLoading = true;
        $box.addClass("swap");
        $.ajax({ url: "https://v1.hitokoto.cn/?c=d&encode=json", dataType: "json", cache: false, timeout: 6000 })
          .done(renderSaying)
          .fail(function () { renderSaying(FALLBACK); })
          .always(function () {
            $box.removeClass("swap");
            sayingLoading = false;
          });
      }

      $box.on("click", loadSaying);
      loadSaying();

      /* ===================== 最新博文 =====================
       * 博客（52xk.cc）也部署在 GitHub Pages 且返回 access-control-allow-origin: *，
       * 因此浏览器可直连抓取，无需任何代理。
       * 它是 Hexo 站点、无 RSS/JSON 接口，这里点击时直接拉首页 HTML，
       * 用 DOMParser 解析出最新文章（标题 / 链接 / 日期 / 摘要），首次点击才请求。
       */
      var BLOG_URL = "https://52xk.cc/";
      var $toggle = $(".posts-toggle");
      var $pbody = $("#posts-body");
      var postsLoaded = false;
      var postsLoading = false;

      function esc(s) { return $("<div>").text(s == null ? "" : s).html(); }
      function errHtml() {
        return '<p class="posts-hint">没拉到博文，<a href="' + BLOG_URL +
               '" target="_blank" rel="noopener">直接去博客看看 →</a></p>';
      }

      function loadPosts() {
        if (postsLoaded || postsLoading) { return; }
        postsLoading = true;
        $pbody.html('<p class="posts-hint">正在加载……</p>');
        $.ajax({ url: BLOG_URL, dataType: "html", timeout: 9000 })
          .done(function (html) {
            var doc = new DOMParser().parseFromString(html, "text/html");
            var items = doc.querySelectorAll(".home-post-item");
            if (!items.length) { $pbody.html(errHtml()); return; }
            var out = "";
            var max = Math.min(items.length, 5);
            for (var i = 0; i < max; i++) {
              var a = items[i].querySelector(".home-post-title a");
              if (!a) { continue; }
              var title = (a.textContent || "").trim();
              var href = new URL(a.getAttribute("href"), BLOG_URL).href;
              var dEl = items[i].querySelector(".home-post-history");
              var date = dEl ? (dEl.textContent || "").trim().split(" ")[0] : "";
              var cEl = items[i].querySelector(".home-post-content");
              var desc = cEl ? (cEl.textContent || "").replace(/\s+/g, " ").trim() : "";
              out += '<a class="post-card" href="' + esc(href) + '" target="_blank" rel="noopener">' +
                       '<span class="post-card-title">' + esc(title) + '</span>' +
                       (date ? '<span class="post-card-date">' + esc(date) + '</span>' : '') +
                       (desc ? '<span class="post-card-desc">' + esc(desc) + '</span>' : '') +
                     '</a>';
            }
            $pbody.html(out || errHtml());
            postsLoaded = !!out;
          })
          .fail(function () { $pbody.html(errHtml()); })
          .always(function () { postsLoading = false; });
      }

      function openPanel() {
        $("body").addClass("posts-open");
        $toggle.attr("aria-expanded", "true");
        loadPosts();
      }
      function closePanel() {
        $("body").removeClass("posts-open");
        $toggle.attr("aria-expanded", "false");
      }

      $toggle.on("click", function (e) {
        e.preventDefault();
        if ($("body").hasClass("posts-open")) { closePanel(); } else { openPanel(); }
      });
      $("#posts-close").on("click", closePanel);
      $(document).on("keydown", function (e) {
        if (e.key === "Escape") { closePanel(); }
      });
    });
  </script>
</body>
</html>
