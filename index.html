<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="小轲的个人主页 · 00 后 Java 码农，河北人，喜欢分享生活里的点点滴滴。">
  <title>小轲</title>
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #f4f5f7;
      --ink-dim: rgba(244, 245, 247, .68);
      --ink-faint: rgba(244, 245, 247, .42);
      --hair: rgba(255, 255, 255, .16);
      --panel: rgba(20, 22, 28, .34);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC",
        "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
      color: var(--ink);
      background: #11151c;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      /* 全局文字投影：亮色壁纸下也能撑住可读性 */
      text-shadow: 0 1px 2px rgba(0, 0, 0, .55), 0 0 12px rgba(0, 0, 0, .35);
    }

    /* 背景层 + 三层降级的兜底渐变 */
    #bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-color: #11151c;
      background-image:
        radial-gradient(120% 90% at 18% 12%, #20303a 0%, #141a22 48%, #0c0f15 100%);
      opacity: 0;
      transform: scale(1.04);
      transition: opacity 1.1s ease, transform 6s ease;
      z-index: -2;
    }
    #bg.loaded { opacity: 1; transform: scale(1); }
    body.no-bg #bg { opacity: 1; transform: scale(1); }

    /* 压暗，保证文字可读 */
    #bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(8, 10, 14, .72) 0%, rgba(8, 10, 14, .42) 34%, rgba(8, 10, 14, .12) 64%, rgba(8, 10, 14, .04) 100%),
        linear-gradient(180deg, rgba(8, 10, 14, .34) 0%, rgba(8, 10, 14, 0) 30%, rgba(8, 10, 14, .55) 100%);
    }

    .stage {
      position: relative;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: clamp(20px, 4vh, 40px) clamp(20px, 5vw, 48px);
    }

    main {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }

    /* 跟随文字的羽化暗色光晕：边缘虚化无硬边，任何壁纸下都托住文字 */
    main::before {
      content: "";
      position: absolute;
      inset: -6% -14% -6% -16%;
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(115% 95% at 28% 50%,
        rgba(6, 8, 12, .58) 0%,
        rgba(6, 8, 12, .40) 38%,
        rgba(6, 8, 12, .16) 64%,
        rgba(6, 8, 12, 0) 82%);
      filter: blur(10px);
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid var(--hair);
      object-fit: cover;
      background: rgba(255, 255, 255, .06);
      margin-bottom: clamp(16px, 3vh, 26px);
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 3.6rem);
      font-weight: 600;
      letter-spacing: -.02em;
      line-height: 1.05;
      text-shadow: 0 2px 6px rgba(0, 0, 0, .55), 0 0 22px rgba(0, 0, 0, .4);
    }

    .tagline {
      margin-top: 12px;
      font-size: clamp(.92rem, 2.4vw, 1.02rem);
      font-weight: 400;
      color: var(--ink-dim);
      letter-spacing: .01em;
    }
    .tagline span { color: var(--ink-faint); padding: 0 .55em; }

    .bio {
      margin-top: clamp(16px, 3vh, 22px);
      max-width: 30em;
      font-size: clamp(.95rem, 2.5vw, 1.06rem);
      font-weight: 300;
      line-height: 1.7;
      color: var(--ink-dim);
    }

    /* 一言 */
    .saying {
      margin-top: clamp(18px, 3.4vh, 26px);
      padding-left: 14px;
      border-left: 2px solid var(--hair);
      cursor: pointer;
      max-width: 32em;
      user-select: none;
      transition: opacity .35s ease;
    }
    .saying p {
      font-size: clamp(.9rem, 2.3vw, 1rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.6;
      color: var(--ink-dim);
    }
    .saying .src { display: block; margin-top: 4px; font-style: normal; font-size: .8rem; color: var(--ink-faint); }
    .saying.swap { opacity: 0; }

    /* 链接 */
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: clamp(22px, 4vh, 32px);
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 15px;
      font-size: .9rem;
      font-weight: 400;
      color: var(--ink);
      text-decoration: none;
      border: 1px solid var(--hair);
      border-radius: 999px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: border-color .2s ease, background .2s ease, transform .2s ease;
    }
    .links a:hover {
      border-color: rgba(255, 255, 255, .42);
      background: rgba(255, 255, 255, .12);
      transform: translateY(-2px);
    }
    .links svg { width: 16px; height: 16px; display: block; }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      font-size: .72rem;
      line-height: 1.5;
      color: var(--ink-faint);
    }
    footer a { color: var(--ink-faint); text-decoration: none; }
    footer a:hover { color: var(--ink-dim); }
    .credit { text-align: right; max-width: 50%; }
    .beian { display: flex; flex-direction: column; gap: 2px; }
    .beian .dot { padding: 0 .4em; color: var(--ink-faint); }

    @media (max-width: 560px) {
      main { justify-content: center; }
      footer { font-size: .66rem; }
      .credit { display: none; }
    }
  </style>
</head>
<body>

  <script src="https://cdn.staticfile.net/jquery/3.7.1/jquery.min.js"></script>
  <script>
    jQuery(function ($) {
      var BING_API = "https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1";
      var BING_HOST = "https://www.bing.com";

      // 内置兜底壁纸：即使 file:// 打开、所有请求都失败，也能立刻有图
      var DEFAULT_WALLPAPER = {
        url: "https://www.bing.com/th?id=OHR.SevenMileTurtle_EN-US6164934763_1920x1080.jpg&rf=LaDigue_1920x1080.jpg&pid=hp",
        copyright: "玳瑁海龟，大开曼岛七英里海滩附近，开曼群岛 (© Alex Mustard/Nature Picture Library)"
      };

      $("#year").text(new Date().getFullYear());

      /* ===================== 壁纸 =====================
       * 官方 Bing 接口（HPImageArchive.aspx）返回的是 JSON，且不带 CORS 头，
       * 浏览器无法直连读取，所以这里：
       *   1) 先用内置兜底图秒铺背景，避免白屏；
       *   2) 同时通过多个 CORS 代理并行请求官方接口（谁先回来用谁 = 多线程竞速），
       *      拿到 JSON 后用 urlbase 拼出图片地址；
       *   3) 实在都失败就保留兜底图 / CSS 渐变。
       * 图片地址形如：https://www.bing.com + url（含分辨率）。
       */
      var bg = $("#bg");
      var remoteApplied = false; // 已用上"远程当天壁纸"后，本地源不再覆盖

      function fullImageUrl(item) {
        // 优先用 urlbase 自己拼分辨率，其次用接口给的 url，最后退回 url 字段
        var path = item.urlbase ? (item.urlbase + "_1920x1080.jpg") : item.url;
        return path.indexOf("http") === 0 ? path : BING_HOST + path;
      }

      function setBackground(item, isRemote) {
        if (!item || (!item.url && !item.urlbase)) { return; }
        if (remoteApplied && !isRemote) { return; } // 远程已生效，不被本地兜底覆盖
        var url = fullImageUrl(item);
        var img = new Image();
        img.onload = function () {
          if (isRemote) { remoteApplied = true; }
          bg.css("background-image", 'url("' + url + '")').addClass("loaded");
          $("body").removeClass("no-bg");
          if (item.copyright) { $("#credit").text(item.copyright); }
        };
        img.onerror = function () {
          if (!bg.hasClass("loaded")) { $("body").addClass("no-bg"); }
        };
        img.src = url;
      }

      // 1) 立刻铺内置兜底图
      setBackground(DEFAULT_WALLPAPER, false);

      // 2) 本地 wallpaper.json（http/https 部署时可用，比远程更快）
      $.getJSON("wallpaper.json").done(function (d) {
        if (d && d.images && d.images[0]) { setBackground(d.images[0], false); }
      });

      // 3) 官方 Bing 接口经多个 CORS 代理并行竞速，谁先成功用谁（这些代理对 fetch 更友好）
      var bingSources = [
        "https://corsproxy.io/?url=" + encodeURIComponent(BING_API),
        "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(BING_API),
        "https://api.allorigins.win/raw?url=" + encodeURIComponent(BING_API),
        BING_API // 直连（少数环境 / 浏览器插件下可用）
      ];
      $.each(bingSources, function (_, src) {
        fetch(src, { cache: "no-store" })
          .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
          .then(function (d) {
            if (remoteApplied) { return; }
            if (d && d.images && d.images[0]) { setBackground(d.images[0], true); }
          })
          .catch(function () { /* 该源失败，交给其它并行源 */ });
      });

      /* ===================== 一言 ===================== */
      var FALLBACK = { hitokoto: "万般皆是命，半点不由人。", from: "" };
      var $box = $("#saying");
      var $text = $("#saying-text");
      var sayingLoading = false;

      function renderSaying(d) {
        var html = $("<div>").text(d.hitokoto).html();
        if (d.from) { html += '<span class="src">—— ' + $("<div>").text(d.from).html() + "</span>"; }
        $text.html(html);
      }

      function loadSaying() {
        if (sayingLoading) { return; }
        sayingLoading = true;
        $box.addClass("swap");
        $.ajax({ url: "https://v1.hitokoto.cn/?c=d&encode=json", dataType: "json", cache: false, timeout: 6000 })
          .done(renderSaying)
          .fail(function () { renderSaying(FALLBACK); })
          .always(function () {
            $box.removeClass("swap");
            sayingLoading = false;
          });
      }

      $box.on("click", loadSaying);
      loadSaying();
    });
  </script>
